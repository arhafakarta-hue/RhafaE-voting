name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ "main" ] # Triggers when you push to main

# Grants permission to let the workflow upload to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Compiles the app. 
      # CRITICAL: The base-href MUST match your repository name exactly!
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/RhafaE-voting/"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web' # Points to the compiled web files

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4